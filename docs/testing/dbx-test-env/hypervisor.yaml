kind: Hypervisor
defaults:
  resources:
    memory: 4096
    cores: 2
    sockets: 1
  tags: [proxctl, dbx-test, ci]
nodes:
  dbx-test-oracle-19c:
    proxmox:
      node_name: proximo01
      vm_id: 2901
    resources:
      memory: 8192
      cores: 4
      sockets: 1
    ips:
      public: 10.10.0.191
    nics:
      - name: net0
        usage: public
        bridge: vmbr0
        network: public
        ipv4:
          address: 10.10.0.191/24
          gateway: 10.10.0.1
          dns: [10.10.0.1]
    disks:
      - id: 0
        size: 64G
        storage_class: local-lvm
        interface: scsi0
        role: root
      - id: 1
        size: 80G
        storage_class: local-lvm
        interface: scsi1
        role: oracle-data
        tag: oracle-data
  dbx-test-pg-16:
    proxmox:
      node_name: proximo01
      vm_id: 2902
    ips:
      public: 10.10.0.192
    nics:
      - name: net0
        usage: public
        bridge: vmbr0
        network: public
        ipv4:
          address: 10.10.0.192/24
          gateway: 10.10.0.1
          dns: [10.10.0.1]
    disks:
      - id: 0
        size: 32G
        storage_class: local-lvm
        interface: scsi0
        role: root
      - id: 1
        size: 40G
        storage_class: local-lvm
        interface: scsi1
        role: pg-data
        tag: pg-data
  dbx-test-plain-ol9:
    proxmox:
      node_name: proximo01
      vm_id: 2903
    ips:
      public: 10.10.0.193
    nics:
      - name: net0
        usage: public
        bridge: vmbr0
        network: public
        ipv4:
          address: 10.10.0.193/24
          gateway: 10.10.0.1
          dns: [10.10.0.1]
    disks:
      - id: 0
        size: 32G
        storage_class: local-lvm
        interface: scsi0
        role: root
iso:
  storage: local
  image: OracleLinux-R9-U3-x86_64-dvd.iso
  guest_os_type: l26
kickstart:
  distro: oraclelinux9
  timezone: Europe/Berlin
  lang: en_US.UTF-8
  mode: text
  chrony_servers: [0.pool.ntp.org, 1.pool.ntp.org]
  sudo:
    wheel_nopasswd: true
  packages:
    base: [chrony, qemu-guest-agent, cifs-utils]
  firewall:
    enabled: false
  update_system: true
  ssh_keys:
    root:
      - ${env:DBX_CI_SSH_PUBKEY}
